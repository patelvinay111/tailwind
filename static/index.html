<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailwind AI</title>
  <style>
    :root {
      --bg: #0b1020; --card: #151c31; --line: #263153; --text: #e8ecf6;
      --muted: #97a2c0; --accent: #5b8cff; --good: #35c77f; --bad: #ff6b6b;
      --warn: #ffcc66;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 40px 16px;
    }
    h1 { margin: 0 0 4px; font-size: 26px; }
    .sub { color: var(--muted); margin: 0 0 28px; }
    button {
      background: var(--accent); color: white; border: none; border-radius: 10px;
      padding: 14px 22px; font-size: 16px; font-weight: 600; cursor: pointer;
      transition: transform .05s ease, opacity .2s ease;
    }
    button:hover { opacity: .92; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .link { background: none; color: var(--muted); font-weight: 400; font-size: 13px; padding: 6px; }
    .status {
      margin: 22px 0 4px; padding: 12px 18px; border-radius: 10px; background: var(--card);
      border: 1px solid var(--line); min-width: 320px; text-align: center; max-width: 640px;
    }
    .status .badge {
      display: inline-block; font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      padding: 3px 8px; border-radius: 999px; margin-bottom: 6px; font-weight: 700;
    }
    .badge.calling, .badge.awaiting_confirmation, .badge.rebooking { background: #2a3358; color: var(--warn); }
    .badge.done { background: #16351f; color: var(--good); }
    .badge.error, .badge.declined { background: #3a1d22; color: var(--bad); }
    .badge.idle { background: #232a44; color: var(--muted); }
    .spinner {
      display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted);
      border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 26px; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 20px; width: 300px;
    }
    .card.old { border-color: #4a2730; }
    .card.new { border-color: #1f4a33; }
    .card h3 { margin: 0 0 2px; font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .card .tag { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .tag.cancelled { background: #3a1d22; color: var(--bad); }
    .tag.confirmed { background: #16351f; color: var(--good); }
    .route { font-size: 22px; font-weight: 700; margin: 14px 0 2px; }
    .flightno { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    .row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; border-top: 1px solid var(--line); }
    .row span:first-child { color: var(--muted); }
    .reason { margin-top: 12px; font-size: 13px; color: var(--warn); font-style: italic; }
    .hidden { display: none; }
    .transcript {
      max-width: 640px; width: 100%; margin: 16px auto 0; background: var(--card);
      border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px;
      max-height: 260px; overflow-y: auto; text-align: left;
    }
    .transcript .thead { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
    .cstatus { float: right; font-size: 11px; font-weight: 700; letter-spacing: .04em; }
    .cstatus .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    .cstatus.connecting { color: var(--warn); }
    .cstatus.connecting .dot { background: var(--warn); animation: pulse 1s infinite; }
    .cstatus.live { color: var(--good); }
    .cstatus.live .dot { background: var(--good); animation: pulse 1.2s infinite; }
    .cstatus.ended { color: var(--muted); }
    .cstatus.ended .dot { background: var(--muted); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
    .tline { font-size: 14px; margin: 6px 0; line-height: 1.4; }
    .tline .who { font-weight: 700; margin-right: 6px; }
    .tline.agent .who { color: var(--accent); }
    .tline.you .who { color: var(--good); }
    .arrow { align-self: center; font-size: 28px; color: var(--muted); }
    @media (max-width: 680px) { .arrow { transform: rotate(90deg); } }
  </style>
</head>
<body>
  <h1>✈️ Tailwind AI</h1>
  <p class="sub">Proactive flight-disruption rebooking — powered by Sabre + Vocal Bridge.</p>

  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button id="voice" onclick="toggleVoice()">🎙️ Talk to Agent</button>
    <button id="go" onclick="simulate()">Simulate Flight Cancellation</button>
  </div>

  <div class="status">
    <div><span id="badge" class="badge idle">idle</span></div>
    <div id="message"><span id="spin" class="spinner hidden"></span><span id="msg">Ready.</span></div>
    <div id="voiceState" class="hidden" style="margin-top:8px;font-size:13px;color:var(--muted);"></div>
  </div>
  <button class="link" onclick="reset()">reset demo</button>

  <div id="transcript" class="transcript hidden"><div class="thead">Live transcript <span id="callStatus" class="cstatus"></span></div></div>

  <audio id="agentAudio" autoplay></audio>

  <div class="cards">
    <div id="oldCard" class="card old hidden"></div>
    <div id="arrow" class="arrow hidden">→</div>
    <div id="newCard" class="card new hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
  <script>
    let polling = null;
    let room = null;   // LiveKit room for the browser voice session

    // ---- Browser voice (Vocal Bridge over LiveKit / WebRTC) ----
    let segEls = {};   // transcription segment id -> DOM node (for live updates)

    function setVoiceState(text, show = true) {
      const el = document.getElementById('voiceState');
      el.textContent = text;
      el.classList.toggle('hidden', !show);
    }

    function clearTranscript() {
      segEls = {};
      const t = document.getElementById('transcript');
      t.innerHTML = '<div class="thead">Live transcript <span id="callStatus" class="cstatus"></span></div>';
      t.classList.add('hidden');
    }

    // Call-status badge in the transcript header: 'connecting' | 'live' | 'ended'.
    function setCallStatus(state) {
      const t = document.getElementById('transcript');
      t.classList.remove('hidden');           // show the panel as soon as a call starts
      const el = document.getElementById('callStatus');
      if (!el) return;
      const map = { connecting: 'Connecting…', live: 'Live', ended: 'Call ended' };
      const label = map[state] || '';
      el.className = 'cstatus ' + (state || '');
      el.innerHTML = label ? '<span class="dot"></span>' + label : '';
    }

    // Append or update a transcript line. `id` (if given) lets interim results
    // update in place instead of duplicating.
    function addTranscript(role, text, id) {
      if (!text) return;
      const t = document.getElementById('transcript');
      t.classList.remove('hidden');
      let el = id ? segEls[id] : null;
      if (!el) {
        el = document.createElement('div');
        el.className = 'tline ' + (role === 'agent' ? 'agent' : 'you');
        t.appendChild(el);
        if (id) segEls[id] = el;
      }
      const who = role === 'agent' ? '🤖 Agent' : '🧑 You';
      el.innerHTML = '<span class="who">' + who + '</span>' + text;
      t.scrollTop = t.scrollHeight;
    }

    function roleFromIdentity(identity) {
      return (identity || '').toLowerCase().includes('agent') ? 'agent' : 'you';
    }

    // Wire transcript sources on a connected room. Handles LiveKit's native
    // transcription events and (as a fallback) custom data-channel messages,
    // since VB may use either.
    function wireTranscripts(LK, room) {
      if (LK.RoomEvent.TranscriptionReceived) {
        room.on(LK.RoomEvent.TranscriptionReceived, (segments, participant) => {
          const role = roleFromIdentity(participant && participant.identity);
          for (const s of segments) addTranscript(role, s.text, s.id);
        });
      }
      room.on(LK.RoomEvent.DataReceived, (payload, participant) => {
        try {
          const msg = JSON.parse(new TextDecoder().decode(payload));
          const text = msg.text || msg.transcript || msg.message || msg.content;
          const role = (msg.role || msg.speaker || (participant && participant.identity) || '')
            .toString().toLowerCase().includes('agent') ? 'agent' : 'you';
          if (text) addTranscript(role, text, msg.id);
        } catch (_) { /* non-JSON data — ignore */ }
      });
    }

    async function toggleVoice() {
      if (room) { await disconnectVoice(); return; }
      const btn = document.getElementById('voice');
      btn.disabled = true;
      setVoiceState('🔗 Connecting…');
      try {
        // Fresh run: clear any prior itinerary + transcript so it all fills in live.
        await fetch('/reset', { method: 'POST' });
        render({ state: 'idle', message: 'Ready.' });
        document.getElementById('oldCard').classList.add('hidden');
        document.getElementById('newCard').classList.add('hidden');
        document.getElementById('arrow').classList.add('hidden');
        clearTranscript();
        setCallStatus('connecting');

        const tok = await (await fetch('/voice-token', { method: 'POST' })).json();
        if (!tok.token || !tok.livekit_url) throw new Error(tok.error || tok.note || 'no token');

        const LK = window.LivekitClient;
        room = new LK.Room();
        room.on(LK.RoomEvent.TrackSubscribed, (track) => {
          if (track.kind === 'audio') track.attach(document.getElementById('agentAudio'));
        });
        room.on(LK.RoomEvent.Disconnected, () => { room = null; resetVoiceButton(); setCallStatus('ended'); });
        wireTranscripts(LK, room);

        await room.connect(tok.livekit_url, tok.token);
        await room.localParticipant.setMicrophoneEnabled(true);

        btn.textContent = '⏹ End Call';
        btn.disabled = false;
        setVoiceState('🔴 Connected — the agent is on the line. Speak now.');
        setCallStatus('live');
        startPolling();   // cards update as the agent calls our tools
      } catch (e) {
        setVoiceState('⚠️ ' + (e.message || e) + ' (mic permission? try again)');
        setCallStatus('ended');
        btn.disabled = false;
        try { if (room) await room.disconnect(); } catch (_) {}
        room = null;
      }
    }

    async function disconnectVoice() {
      try { if (room) await room.disconnect(); } catch (e) {}
      room = null;
      resetVoiceButton();
    }

    function resetVoiceButton() {
      const btn = document.getElementById('voice');
      btn.textContent = '🎙️ Talk to Agent';
      btn.disabled = false;
      setVoiceState('', false);
    }

    async function simulate() {
      document.getElementById('go').disabled = true;
      await fetch('/simulate-cancellation', { method: 'POST' });
      startPolling();
    }

    async function reset() {
      await fetch('/reset', { method: 'POST' });
      document.getElementById('go').disabled = false;
      document.getElementById('oldCard').classList.add('hidden');
      document.getElementById('newCard').classList.add('hidden');
      document.getElementById('arrow').classList.add('hidden');
      render({ state: 'idle', message: 'Ready.' });
    }

    function startPolling() {
      if (polling) clearInterval(polling);
      poll();
      polling = setInterval(poll, 2000);
    }

    async function poll() {
      const s = await (await fetch('/status')).json();
      render(s);
      if (['done', 'declined', 'error'].includes(s.state) && polling) {
        clearInterval(polling); polling = null;
        document.getElementById('go').disabled = false;
      }
    }

    function render(s) {
      const badge = document.getElementById('badge');
      badge.textContent = (s.state || 'idle').replace(/_/g, ' ');
      badge.className = 'badge ' + (s.state || 'idle');

      document.getElementById('msg').textContent = s.message || '';
      const active = ['calling', 'awaiting_confirmation', 'rebooking'].includes(s.state);
      document.getElementById('spin').classList.toggle('hidden', !active);

      if (s.old_itinerary) {
        document.getElementById('oldCard').classList.remove('hidden');
        document.getElementById('oldCard').innerHTML = cardHtml(s.old_itinerary, 'old');
      }
      if (s.new_itinerary) {
        document.getElementById('arrow').classList.remove('hidden');
        document.getElementById('newCard').classList.remove('hidden');
        document.getElementById('newCard').innerHTML = cardHtml(s.new_itinerary, 'new', s.reason);
      }
    }

    function fmt(iso) {
      if (!iso) return '—';
      const [d, t] = iso.split('T');
      const [h, m] = (t || '00:00').split(':');
      const hr = ((+h % 12) || 12), ap = (+h < 12 ? 'AM' : 'PM');
      return `${d} · ${hr}:${m} ${ap}`;
    }

    function cardHtml(f, kind, reason) {
      const cancelled = kind === 'old';
      const tag = cancelled
        ? '<span class="tag cancelled">CANCELLED</span>'
        : '<span class="tag confirmed">CONFIRMED</span>';
      return `
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3>${cancelled ? 'Original flight' : 'Rebooked flight'}</h3>${tag}
        </div>
        <div class="route">${f.origin} → ${f.destination}</div>
        <div class="flightno">${f.carrier || ''} ${f.flight_number || ''}</div>
        <div class="row"><span>Departs</span><span>${fmt(f.depart)}</span></div>
        <div class="row"><span>Arrives</span><span>${fmt(f.arrive)}</span></div>
        <div class="row"><span>Stops</span><span>${f.stops === 0 ? 'Nonstop' : (f.stops + ' stop')}</span></div>
        <div class="row"><span>Price</span><span>$${(f.price || 0).toFixed(2)} ${f.currency || ''}</span></div>
        <div class="row"><span>Confirmation</span><span>${f.confirmation || '—'}</span></div>
        ${reason ? `<div class="reason">🤖 ${reason}</div>` : ''}
      `;
    }

    // Show any in-progress state on load.
    poll();
  </script>
</body>
</html>
